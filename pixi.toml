[workspace]
name = "holoptycho"
description = "Streaming ptychographic reconstruction on NVIDIA Holoscan (NSLS-II HXN)"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[system-requirements]
libc = { family = "glibc", version = "2.35" }

# Base dependencies shared by all environments (including CI)
[dependencies]
python = ">=3.12"
numpy = ">=1.20"
scipy = ">=1.14"
h5py = ">=3.12"
pyzmq = ">=26.0"
pyyaml = "*"
cbor2 = "*"
pytest = "*"

[target.linux-64.dependencies]
libgl = "*"

# GPU/CUDA dependencies — Linux only.
# cupy itself is intentionally NOT listed here: holoscan-sdk pulls in
# cupy-cuda12x via pip transitively, and adding the conda-forge `cupy`
# alongside it produces a "multiple CuPy packages installed" warning at
# import time.
[feature.gpu.target.linux-64.dependencies]
numba = "*"
cuda-cudart = ">=12.6.77,<13"
libcublas = ">=12.6.3.3,<13"
libcufft = ">=11.3.0.4,<12"
libcurand = ">=10.3.7.77,<11"
libcusparse-dev = ">=12.5.4.2,<13"
libcusolver = ">=11.7.1.2,<12"
gcc = "==11.4"
gxx = "==11.4"
gcc_linux-64 = "==11.4"
gxx_linux-64 = "==11.4"
nvtx = "==0.2.10"

[feature.gpu.target.linux-64.pypi-dependencies]
holoscan = ">=4.0"
numba-cuda = {version = "*", extras = ["cu12"]}
tensorrt-cu12 = "==10.16.1.11"
tensorrt-cu12-libs = { url = "https://pypi.nvidia.com/tensorrt-cu12-libs/tensorrt_cu12_libs-10.16.1.11-py3-none-manylinux_2_28_x86_64.whl" }
pycuda = "*"

[feature.mpi.target.linux-64.dependencies]
openmpi = "*"
mpi4py = "*"

# Python version features for CI matrix
[feature.py312.dependencies]
python = ">=3.12,<3.13"

[feature.py313.dependencies]
python = ">=3.13,<3.14"

# Lightweight client environment for the hp CLI — no GPU deps, cross-platform
[feature.client.dependencies]
python = ">=3.12"

[feature.client.pypi-dependencies]
holoptycho = { path = ".", editable = true }
httpx = ">=0.27"
typer = ">=0.12"
azure-ai-ml = ">=1.15"
azure-identity = ">=1.16"
tiled = {version = ">=0.1", extras = ["client"]}

[feature.client.tasks]
config-from-tiled = "python scripts/config_from_tiled.py"

# Test environment — adds pytest and FastAPI test deps on top of the client feature
[feature.test.dependencies]
pytest = "*"

[feature.test.pypi-dependencies]
fastapi = ">=0.110"
httpx = ">=0.27"

# Lightweight replay environment for scripts/replay_from_tiled.py — no GPU deps
[feature.replay.dependencies]
python = ">=3.12"
numpy = ">=1.20"
pyzmq = ">=26.0"
matplotlib = ">=3.10.9,<4"

[feature.replay.pypi-dependencies]
tiled = {version = ">=0.1", extras = ["client"]}
dectris-compression = ">=0.3"
bitshuffle = "*"

[environments]
default = { features = ["gpu", "mpi"], solve-group = "default" }
client = { features = ["client"], solve-group = "client", no-default-feature = true }
test = { features = ["client", "test"], solve-group = "test", no-default-feature = true }
replay = { features = ["replay"], solve-group = "replay", no-default-feature = true }
ci-py312 = { features = ["py312"], solve-group = "ci-py312" }
ci-py313 = { features = ["py313"], solve-group = "ci-py313" }

[pypi-dependencies]
dectris-compression = ">=0.3"
matplotlib = ">=3.9"
Cython = ">=3.0.11"
pyFFTW = ">=0.15"
pyqt5 = "*"
holoptycho = { path = ".", editable = true }
ptycho = { path = "../ptycho", editable = true }
ptychoml = { path = "../ptychoml", editable = true }
fastapi = ">=0.110"
uvicorn = {version = ">=0.29", extras = ["standard"]}
httpx = ">=0.27"
typer = ">=0.12"
azure-ai-ml = ">=1.15"
azure-identity = ">=1.16"
tiled = {version = ">=0.1", extras = ["client"]}

[activation]
scripts = ["set-ld-path.sh"]

[tasks]
test = "pytest tests/ -v"
api = "bash -c 'SERVER_STREAM_SOURCE=${SERVER_STREAM_SOURCE:-tcp://localhost:5555} PANDA_STREAM_SOURCE=${PANDA_STREAM_SOURCE:-tcp://localhost:5556} TILED_BASE_URL=${TILED_BASE_URL:-https://tiled.nsls2.bnl.gov} uvicorn holoptycho.server.api:app --host 127.0.0.1 --port 8000'"

[feature.replay.tasks]
replay = "python scripts/replay_from_tiled.py"
